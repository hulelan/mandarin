services:
  - type: web
    name: mandarin-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TRANSCRIPTION_BACKEND
        value: groq
      - key: CORS_ORIGINS
        value: '["https://mandarin-pronunciation.vercel.app"]'
