services:
  - type: web
    name: mandarin-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TRANSCRIPTION_BACKEND
        value: groq
      - key: CORS_ORIGINS
        value: '["https://mandarin-pronunciation.vercel.app"]'
